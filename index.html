function AIChatWidget() {
  const [isOpen, setIsOpen] = useState(false);
  const [messages, setMessages] = useState([
    { role: 'ai', text: 'Halo! Saya AI Assistant SIPRUSAK. Ada yang bisa saya bantu tentang penilaian kerusakan bangunan?' }
  ]);
  const [input, setInput] = useState('');
  const [isTyping, setIsTyping] = useState(false);
  const messagesEndRef = useRef(null);
  const { chatWithAI } = useAIEngine();
  const { addToast } = useApp();

  const scrollToBottom = () => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  };

  useEffect(() => {
    scrollToBottom();
  }, [messages, isOpen]);

  const handleSend = async () => {
    if (!input.trim()) return;

    const userMessage = input.trim();
    setMessages(prev => [...prev, { role: 'user', text: userMessage }]);
    setInput('');
    setIsTyping(true);

    try {
      const response = await chatWithAI(userMessage);
      setMessages(prev => [...prev, { role: 'ai', text: response.response }]);
    } catch (err) {
      addToast('Gagal mendapatkan respons AI', 'error');
    } finally {
      setIsTyping(false);
    }
  };

  return (
    <>
      {/* Floating Button */}
      <button
        onClick={() => setIsOpen(!isOpen)}
        style={{
          position: 'fixed',
          bottom: 24,
          right: 24,
          width: 56,
          height: 56,
          borderRadius: '50%',
          background: 'var(--accent2)',
          border: 'none',
          cursor: 'pointer',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          boxShadow: '0 4px 12px rgba(33,150,243,0.4)',
          zIndex: 1000,
          fontSize: 24
        }}
      >
        {isOpen ? '✕' : '🤖'}
      </button>

      {/* Chat Window */}
      {isOpen && (
        <div style={{
          position: 'fixed',
          bottom: 90,
          right: 24,
          width: 360,
          height: 480,
          background: 'var(--surface)',
          border: '1px solid var(--border)',
          borderRadius: 12,
          display: 'flex',
          flexDirection: 'column',
          zIndex: 1000,
          overflow: 'hidden',
          boxShadow: '0 8px 32px rgba(0,0,0,0.4)'
        }}>
          {/* Header */}
          <div style={{
            padding: '16px 20px',
            background: 'var(--accent2)',
            color: 'white',
            fontWeight: 600,
            fontSize: 14,
            display: 'flex',
            alignItems: 'center',
            gap: 8
          }}>
            <span>🤖</span>
            <span>AI Assistant SIPRUSAK</span>
          </div>

          {/* Messages */}
          <div style={{
            flex: 1,
            overflow: 'auto',
            padding: 16,
            display: 'flex',
            flexDirection: 'column',
            gap: 12
          }}>
            {messages.map((msg, idx) => (
              <div key={idx} style={{
                alignSelf: msg.role === 'user' ? 'flex-end' : 'flex-start',
                maxWidth: '85%',
                padding: '10px 14px',
                borderRadius: 12,
                background: msg.role === 'user' ? 'var(--accent2)' : 'var(--surface2)',
                color: msg.role === 'user' ? 'white' : 'var(--text)',
                fontSize: 13,
                lineHeight: 1.5,
                whiteSpace: 'pre-wrap'
              }}>
                {msg.text}
              </div>
            ))}
            {isTyping && (
              <div style={{
                alignSelf: 'flex-start',
                padding: '10px 14px',
                borderRadius: 12,
                background: 'var(--surface2)',
                fontSize: 13,
                color: 'var(--text3)'
              }}>
                Mengetik...
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>

          {/* Input */}
          <div style={{
            padding: 12,
            borderTop: '1px solid var(--border)',
            display: 'flex',
            gap: 8
          }}>
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyPress={e => e.key === 'Enter' && handleSend()}
              placeholder="Tanya tentang kerusakan, biaya, standar..."
              style={{
                flex: 1,
                padding: '10px 14px',
                border: '1px solid var(--border2)',
                borderRadius: 20,
                background: 'var(--surface2)',
                color: 'var(--text)',
                fontSize: 13,
                outline: 'none'
              }}
            />
            <button
              onClick={handleSend}
              disabled={isTyping || !input.trim()}
              style={{
                padding: '10px 16px',
                borderRadius: 20,
                background: 'var(--accent2)',
                color: 'white',
                border: 'none',
                cursor: 'pointer',
                fontSize: 13,
                opacity: isTyping || !input.trim() ? 0.5 : 1
              }}
            >
              Kirim
            </button>
          </div>
        </div>
      )}
    </>
  );
}

// ============================================================
// USER MANAGEMENT PAGE
// ============================================================
function UserManagement() {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const { addToast } = useApp();

  useEffect(() => {
    loadUsers();
  }, []);

  const loadUsers = async () => {
    if (!supabase) {
      setLoading(false);
      return;
    }
    try {
      const { data, error } = await supabase.from('profiles').select('*').order('created_at', { ascending: false });
      if (!error && data) setUsers(data);
    } catch (err) { console.error(err); }
    setLoading(false);
  };

  return (
    <div className="page-content">
      <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 24 }}>Manajemen User</h2>
      <div className="card">
        {loading ? (
          <div className="loading"><div className="spinner"/><span>Memuat data...</span></div>
        ) : users.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">👤</div>
            <h3>Belum Ada User</h3>
            <p>User akan muncul setelah registrasi di Supabase Auth</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>Nama</th><th>Email</th><th>Role</th><th>Instansi</th><th>Jabatan</th></tr>
            </thead>
            <tbody>
              {users.map(u => (
                <tr key={u.id}>
                  <td>{u.full_name || '-'}</td>
                  <td>{u.email || '-'}</td>
                  <td><span className="badge">{u.role}</span></td>
                  <td>{u.instansi || '-'}</td>
                  <td>{u.jabatan || '-'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ============================================================
// REPORTS & EXPORT PAGE
// ============================================================
function ReportsPage({ surveys }) {
  const [filterStatus, setFilterStatus] = useState('all');
  const { addToast } = useApp();

  const filteredSurveys = filterStatus === 'all' 
    ? surveys 
    : surveys.filter(s => s.status === filterStatus);

  const exportAllToExcel = () => {
    if (filteredSurveys.length === 0) {
      addToast('Tidak ada data untuk export', 'warning');
      return;
    }
    // Export logic here
    addToast(`Export ${filteredSurveys.length} survey ke Excel`, 'success');
  };

  const stats = {
    total: surveys.length,
    draft: surveys.filter(s => s.status === 'draft').length,
    disetujui: surveys.filter(s => s.status === 'disetujui').length,
    rusakRingan: surveys.filter(s => s.kesimpulan_kerusakan === 'Rusak Ringan').length,
    rusakSedang: surveys.filter(s => s.kesimpulan_kerusakan === 'Rusak Sedang').length,
    rusakBerat: surveys.filter(s => s.kesimpulan_kerusakan === 'Rusak Berat').length,
  };

  return (
    <div className="page-content">
      <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 24 }}>Laporan & Export</h2>
      
      <div className="stats-grid" style={{ marginBottom: 24 }}>
        <div className="stat-card">
          <div className="stat-label">Total Survei</div>
          <div className="stat-value">{stats.total}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Draft</div>
          <div className="stat-value" style={{ color: 'var(--text3)' }}>{stats.draft}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Disetujui</div>
          <div className="stat-value" style={{ color: 'var(--success)' }}>{stats.disetujui}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Rusak Ringan</div>
          <div className="stat-value" style={{ color: 'var(--ringan)' }}>{stats.rusakRingan}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Rusak Sedang</div>
          <div className="stat-value" style={{ color: 'var(--sedang)' }}>{stats.rusakSedang}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Rusak Berat</div>
          <div className="stat-value" style={{ color: 'var(--berat)' }}>{stats.rusakBerat}</div>
        </div>
      </div>

      <div className="card" style={{ marginBottom: 24 }}>
        <div className="card-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span>Filter & Export</span>
          <button className="btn btn-primary" onClick={exportAllToExcel}>📊 Export Excel</button>
        </div>
        <div style={{ padding: 16 }}>
          <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ maxWidth: 200 }}>
            <option value="all">Semua Status</option>
            <option value="draft">Draft</option>
            <option value="disposisi">Disposisi</option>
            <option value="persiapan">Persiapan</option>
            <option value="survey_lapangan">Survey Lapangan</option>
            <option value="analisis_data">Analisis Data</option>
            <option value="penilaian">Penilaian</option>
            <option value="diperiksa">Diperiksa</option>
            <option value="disetujui">Disetujui</option>
            <option value="ditolak">Ditolak</option>
          </select>
          <p style={{ marginTop: 12, fontSize: 12, color: 'var(--text3)' }}>
            Menampilkan {filteredSurveys.length} dari {surveys.length} survey
          </p>
        </div>
      </div>

      <div className="card">
        <div className="card-header">Ringkasan Survey</div>
        {filteredSurveys.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">📋</div>
            <h3>Tidak Ada Data</h3>
            <p>Belum ada survey dengan filter yang dipilih</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>Sekolah</th><th>Bangunan</th><th>Status</th><th>Kerusakan</th><th>Aksi</th></tr>
            </thead>
            <tbody>
              {filteredSurveys.map(s => (
                <tr key={s.id}>
                  <td>{s.nama_sekolah}</td>
                  <td>{s.nama_bangunan}</td>
                  <td><span className={`badge ${s.status === 'disetujui' ? 'badge-success' : s.status === 'draft' ? 'badge-warning' : 'badge-info'}`}>{s.status?.replace(/_/g, ' ')}</span></td>
                  <td>{s.total_nilai_kerusakan ? `${s.total_nilai_kerusakan.toFixed(1)}%` : '-'}</td>
                  <td><button className="btn btn-secondary btn-sm" onClick={() => exportToExcel(s)}>Export</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ============================================================
// APP UTAMA
// ============================================================
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [currentPage, setCurrentPage] = useState('dashboard');
  const [surveys, setSurveys] = useState([]);
  const [selectedSurvey, setSelectedSurvey] = useState(null);
  const [surveysLoading, setSurveysLoading] = useState(false);
  const [toasts, setToasts] = useState([]);

  const [hasUnsavedChanges, setHasUnsavedChanges] = useState(false);

  const addToast = useCallback((message, type = 'info') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }, []);

  // Auth
  useEffect(() => {
    if (IS_DEMO_MODE) {
      setLoading(false); return;
    }
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        supabase.from('profiles').select('*').eq('id', session.user.id).single()
          .then(({ data }) => { setUser(data || { id: session.user.id, email: session.user.email, role: 'surveyor', full_name: session.user.email }); });
      }
      setLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      if (!session) setUser(null);
    });
    return () => subscription.unsubscribe();
  }, []);

  // Load surveys - with localStorage for demo mode
  useEffect(() => {
    if (user) loadSurveys();
  }, [user]);

  // Beforeunload warning for unsaved changes
  useEffect(() => {
    const handleBeforeUnload = (e) => {
      if (hasUnsavedChanges) {
        e.preventDefault();
        e.returnValue = 'Anda memiliki perubahan yang belum disimpan. Yakin ingin keluar?';
        return e.returnValue;
      }
    };
    window.addEventListener('beforeunload', handleBeforeUnload);
    return () => window.removeEventListener('beforeunload', handleBeforeUnload);
  }, [hasUnsavedChanges]);

  const loadSurveys = async () => {
    setSurveysLoading(true);
    if (IS_DEMO_MODE) {
      // Load from localStorage or use default demo data
      const saved = localStorage.getItem('siprusak_demo_surveys');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          setSurveys(parsed);
          setSurveysLoading(false);
          return;
        } catch (e) { console.error('Failed to load saved surveys', e); }
      }
      // Default demo data
      const defaultSurveys = [
        { id: '1', nama_sekolah: 'SDN 01 Contoh', nama_bangunan: 'Gedung Kelas A', npsn: '12345678', jumlah_lantai: 1, status: 'penilaian', total_nilai_kerusakan: 22.5, kesimpulan_kerusakan: 'Rusak Ringan', kabupaten_kota: 'Kab. Contoh', created_at: new Date().toISOString() },
        { id: '2', nama_sekolah: 'SMPN 02 Contoh', nama_bangunan: 'Gedung Utama', npsn: '87654321', jumlah_lantai: 2, status: 'disetujui', total_nilai_kerusakan: 38.7, kesimpulan_kerusakan: 'Rusak Sedang', kabupaten_kota: 'Kota Contoh', created_at: new Date().toISOString() },
        { id: '3', nama_sekolah: 'SMAN 03 Contoh', nama_bangunan: 'Lab IPA', npsn: '11223344', jumlah_lantai: 1, status: 'draft', total_nilai_kerusakan: null, kesimpulan_kerusakan: null, kabupaten_kota: 'Kab. Contoh', created_at: new Date().toISOString() },
      ];
      setSurveys(defaultSurveys);
      localStorage.setItem('siprusak_demo_surveys', JSON.stringify(defaultSurveys));
      setSurveysLoading(false);
      return;
    }
    try {
      const { data, error } = await supabase.from('surveys').select('*').order('created_at', { ascending: false });
      if (!error && data) setSurveys(data);
    } catch (err) { console.error(err); }
    setSurveysLoading(false);
  };

  const handleNewSurvey = async (formData) => {
    if (IS_DEMO_MODE) {
      const newSurvey = { ...formData, id: Date.now().toString(), status: 'draft', total_nilai_kerusakan: null, kesimpulan_kerusakan: null, created_at: new Date().toISOString() };
      const updated = [newSurvey, ...surveys];
      setSurveys(updated);
      localStorage.setItem('siprusak_demo_surveys', JSON.stringify(updated));
      setSelectedSurvey(newSurvey);
      setCurrentPage('survey-detail');
      addToast('Survei baru dibuat (mode demo - tersimpan di browser)', 'success');
      return;
    }
    try {
      const { data, error } = await supabase.from('surveys').insert({
        ...formData, created_by: user?.id, surveyor_id: user?.id, status: 'draft',
      }).select().single();
      if (error) throw error;
      setSurveys(prev => [data, ...prev]);
      setSelectedSurvey(data);
      setCurrentPage('survey-detail');
      addToast('Survei baru berhasil dibuat', 'success');
    } catch (err) {
      addToast('Gagal membuat survei: ' + err.message, 'error');
    }
  };

  const handleLogout = async () => {
    if (!IS_DEMO_MODE) await supabase.auth.signOut();
    setUser(null);
    addToast('Berhasil keluar', 'info');
  };

  if (loading) return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg)' }}>
      <div className="loading"><div className="spinner"/><span style={{ color: 'var(--text3)' }}>Memuat...</span></div>
    </div>
  );

  if (!user) return (
    <AppContext.Provider value={{ addToast, user }}>
      <AuthPage onLogin={setUser} />
      <ToastContainer toasts={toasts} />
    </AppContext.Provider>
  );

  const renderPage = () => {
    if (currentPage === 'survey-detail' && selectedSurvey) {
      return <SurveyDetail 
        survey={selectedSurvey} 
        onBack={() => setCurrentPage('surveys')} 
        onUpdate={loadSurveys}
        onHasChanges={setHasUnsavedChanges}
      />;
    }
    switch (currentPage) {
      case 'dashboard': return <Dashboard surveys={surveys} onNavigate={setCurrentPage} />;
      case 'surveys': return <SurveyList surveys={surveys} loading={surveysLoading}
        onView={(s) => { setSelectedSurvey(s); setCurrentPage('survey-detail'); }}
        onNew={() => setCurrentPage('new-survey')} />;
      case 'new-survey': return <SurveyForm
        onSave={handleNewSurvey}
        onCancel={() => setCurrentPage('surveys')}
        onHasChanges={setHasUnsavedChanges} />;
      case 'users': return <UserManagement />;
      case 'reports': return <ReportsPage surveys={surveys} />;
      default: return <Dashboard surveys={surveys} onNavigate={setCurrentPage} />;
    }
  };

  const pageTitle = {
    dashboard: 'Dashboard',
    surveys: 'Daftar Survei',
    'new-survey': 'Survei Baru',
    'survey-detail': selectedSurvey?.nama_bangunan || 'Detail Survei',
    users: 'Manajemen User',
    reports: 'Laporan & Export',
  }[currentPage] || 'SIPRUSAK';

  return (
    <AppContext.Provider value={{ addToast, user }}>
      <div className="app-shell">
        <Sidebar
          currentPage={currentPage}
          setCurrentPage={setCurrentPage}
          user={user}
          onLogout={handleLogout}
        />
        <main className="main-content">
          <div className="topbar">
            <span className="topbar-title">{pageTitle}</span>
            <div className="topbar-actions">
              <span style={{ fontSize: 11, color: 'var(--text3)', fontFamily: 'var(--mono)' }}>
                {new Date().toLocaleDateString('id-ID', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' })}
              </span>
              {!IS_DEMO_MODE && IS_CONFIGURED && (
                <span className="badge" style={{ background: 'rgba(245,158,11,0.1)', color: 'var(--warning)', border: '1px solid rgba(245,158,11,0.3)', fontSize: 10 }}>
                  DEMO MODE
                </span>
              )}
            </div>
          </div>
          {renderPage()}
        </main>
      </div>
      <ToastContainer toasts={toasts} />
      <AIChatWidget />
    </AppContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
