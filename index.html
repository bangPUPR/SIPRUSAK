// ============================================================
// DETAIL SURVEI (View/Edit dengan Workflow)
// ============================================================
function SurveyDetail({ survey: initialSurvey, onBack, onUpdate, onHasChanges }) {
  const [survey, setSurvey] = useState(initialSurvey);
  const [komponen, setKomponen] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('penilaian');
  const [hasChanges, setHasChanges] = useState(false);
  const { addToast, user } = useApp();
  
  const tipe = survey.jumlah_lantai <= 1 ? 1 : survey.jumlah_lantai === 2 ? 2 : 3;

  // Sync hasChanges with parent
  useEffect(() => {
    if (onHasChanges) onHasChanges(hasChanges);
  }, [hasChanges, onHasChanges]);

  useEffect(() => {
    loadKomponen();
  }, [survey.id]);

  const loadKomponen = async () => {
    setLoading(true);
    if (IS_DEMO_MODE) {
      setLoading(false); return;
    }
    try {
      const { data, error } = await supabase.from('komponen_penilaian')
        .select('*').eq('survey_id', survey.id).order('created_at');
      if (!error && data) setKomponen(data);
    } catch (err) { console.error(err); }
    setLoading(false);
  };

  const handleSavePenilaian = async (komponenList, totalPersen, kesimpulan, isCritical) => {
    if (IS_DEMO_MODE) {
      addToast('Mode demo: data tidak disimpan ke server', 'info');
      setHasChanges(false);
      return;
    }

    // Upsert setiap komponen
    for (const k of komponenList) {
      const record = {
        survey_id: survey.id,
        kode_komponen: k.kode,
        nama_komponen: k.nama,
        sistem: k.sistem,
        satuan: k.satuan,
        volume_total: k.isEstimasi ? null : parseFloat(k.volTotal) || 0,
        tahap1_status: k.tahap1,
        vol_tidak_rusak: k.isEstimasi ? 0 : parseFloat(k.volTidakRusak) || 0,
        vol_sangat_ringan: k.isEstimasi ? 0 : parseFloat(k.volSangatRingan) || 0,
        vol_ringan: k.isEstimasi ? 0 : parseFloat(k.volRingan) || 0,
        vol_sedang: k.isEstimasi ? 0 : parseFloat(k.volSedang) || 0,
        vol_berat: k.isEstimasi ? 0 : parseFloat(k.volBerat) || 0,
        vol_sangat_berat: k.isEstimasi ? 0 : parseFloat(k.volSangatBerat) || 0,
        vol_tidak_sesuai: k.isEstimasi ? 0 : parseFloat(k.volTidakSesuai) || 0,
        persentase_kerusakan: hitungKomponenKerusakan(k).persen,
        bobot_komponen: k.bobot,
        nilai_kerusakan_terbobot: hitungKomponenKerusakan(k).nilaiTerbobot,
      };
      
      const { error } = await supabase.from('komponen_penilaian')
        .upsert(record, { onConflict: 'survey_id,kode_komponen' });
      if (error) throw error;
    }

    // Update survey
    const { error: surveyErr } = await supabase.from('surveys').update({
      total_nilai_kerusakan: totalPersen,
      kesimpulan_kerusakan: kesimpulan,
      is_critical: isCritical,
      status: 'penilaian',
      updated_at: new Date().toISOString(),
    }).eq('id', survey.id);
    
    if (surveyErr) throw surveyErr;
    
    setSurvey(prev => ({ ...prev, total_nilai_kerusakan: totalPersen, kesimpulan_kerusakan: kesimpulan, status: 'penilaian' }));
    setHasChanges(false);
    if (onUpdate) onUpdate();
  };

  const handleWorkflowAdvance = async (newStatus) => {
    if (IS_DEMO_MODE) {
      setSurvey(prev => ({ ...prev, status: newStatus }));
      addToast(`Status diperbarui: ${newStatus.replace(/_/g,' ')}`, 'success');
      return;
    }
    try {
      const { error } = await supabase.from('surveys').update({
        status: newStatus, updated_at: new Date().toISOString(),
        ...(newStatus === 'disetujui' ? { tanggal_disetujui: new Date().toISOString() } : {})
      }).eq('id', survey.id);
      if (error) throw error;
      
      await supabase.from('activity_log').insert({
        survey_id: survey.id, user_id: user?.id,
        action: `Status diubah ke ${newStatus}`,
        old_status: survey.status, new_status: newStatus
      });
      
      setSurvey(prev => ({ ...prev, status: newStatus }));
      if (onUpdate) onUpdate();
      addToast(`Status diperbarui: ${newStatus.replace(/_/g,' ')}`, 'success');
    } catch (err) {
      addToast('Gagal update status: ' + err.message, 'error');
    }
  };

  const currentStepIdx = WORKFLOW_STEPS.findIndex(s => s.key === survey.status);
  const nextStep = WORKFLOW_STEPS[currentStepIdx + 1];

  const tabs = [
    { key: 'penilaian', label: '📋 Form Penilaian' },
    { key: 'foto', label: '📷 Foto Lapangan' },
    { key: 'info', label: 'ℹ Info Bangunan' },
    { key: 'workflow', label: '🔄 Workflow' },
    { key: 'ttd', label: '✍ Tanda Tangan' },
    { key: 'ai', label: '🤖 Analisis AI' },
    { key: 'laporan', label: '📄 Laporan' },
  ];

  return (
    <div className="page-content">
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20, flexWrap: 'wrap', gap: 12 }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
            <button className="btn-icon" onClick={() => { setHasChanges(false); onBack(); }} title="Kembali">←</button>
            <h2 style={{ fontSize: 18, fontWeight: 700 }}>{survey.nama_bangunan}</h2>
            <span className="badge badge-survey" style={{ textTransform: 'capitalize' }}>{survey.jumlah_lantai} Lantai · Form {tipe === 1 ? 'A' : tipe === 2 ? 'B' : 'C'}</span>
          </div>
          <div style={{ fontSize: 13, color: 'var(--text3)', display: 'flex', gap: 16 }}>
            <span>{survey.nama_sekolah}</span>
            {survey.npsn && <span>NPSN: {survey.npsn}</span>}
            <span>{survey.kabupaten_kota}</span>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn btn-secondary btn-sm" 
            onClick={() => exportToExcel(survey, komponen.length > 0 ? komponen : [], tipe)}>
            ↓ Export Excel
          </button>
          {nextStep && survey.status !== 'disetujui' && (
            <button className="btn btn-primary btn-sm"
              onClick={() => handleWorkflowAdvance(nextStep.key)}>
              → {nextStep.label}
            </button>
          )}
        </div>
      </div>

      {/* Workflow Timeline */}
      <div className="timeline" style={{ marginBottom: 20 }}>
        {WORKFLOW_STEPS.map((step, i) => (
          <div key={step.key} className={`timeline-step ${i < currentStepIdx ? 'done' : i === currentStepIdx ? 'current' : ''}`}>
            <div className="timeline-dot">{i < currentStepIdx ? '✓' : i + 1}</div>
            <div className="timeline-label">{step.label}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 20, borderBottom: '1px solid var(--border)', paddingBottom: 0 }}>
        {tabs.map(tab => (
          <button key={tab.key}
            onClick={() => setActiveTab(tab.key)}
            style={{
              padding: '10px 16px', background: 'none', border: 'none', cursor: 'pointer',
              fontSize: 13, fontFamily: 'var(--font)',
              color: activeTab === tab.key ? 'var(--accent2)' : 'var(--text3)',
              borderBottom: `2px solid ${activeTab === tab.key ? 'var(--accent2)' : 'transparent'}`,
              marginBottom: -1, transition: 'all 0.15s',
            }}>
            {tab.label}
          </button>
        ))}
      </div>

      {/* Tab Content */}
      {activeTab === 'penilaian' && (
        <div className="card">
          <div className="card-header">
            Form Penilaian Kerusakan — {tipe === 1 ? 'Bangunan 1 Lantai' : tipe === 2 ? 'Bangunan 2 Lantai / Panggung' : 'Bangunan 3 Lantai atau Lebih'}
          </div>
          {loading ? (
            <div className="loading"><div className="spinner"/></div>
          ) : (
            <AssessmentEngine
              survey={survey}
              komponenData={komponen}
              onSave={handleSavePenilaian}
              onChange={() => setHasChanges(true)}
              readOnly={survey.status === 'disetujui'}
            />
          )}
        </div>
      )}

      {activeTab === 'info' && (
        <div className="card">
          <div className="card-header">Data Identifikasi Bangunan</div>
          <div className="form-grid" style={{ gap: 12 }}>
            {[
              ['Nama Sekolah', survey.nama_sekolah],
              ['NPSN', survey.npsn],
              ['Nama Bangunan', survey.nama_bangunan],
              ['NUP', survey.nup],
              ['Alamat', survey.alamat],
              ['Kabupaten/Kota', survey.kabupaten_kota],
              ['Provinsi', survey.provinsi],
              ['Luas Bangunan', survey.luas_bangunan ? `${survey.luas_bangunan} m²` : '—'],
              ['Jumlah Lantai', `${survey.jumlah_lantai} Lantai`],
              ['Tanggal Survey', survey.tanggal_survey ? new Date(survey.tanggal_survey).toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) : '—'],
              ['Koordinat', survey.koordinat_lat ? `${survey.koordinat_lat}, ${survey.koordinat_lng}` : '—'],
            ].map(([label, value]) => (
              <div key={label} style={{ borderBottom: '1px solid var(--border)', paddingBottom: 10 }}>
                <div style={{ fontSize: 10, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 4 }}>{label}</div>
                <div style={{ fontSize: 13, fontWeight: 500 }}>{value || '—'}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {activeTab === 'workflow' && (
        <div className="card">
          <div className="card-header">Status Workflow & Riwayat</div>
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 13, color: 'var(--text2)', marginBottom: 8 }}>Status Saat Ini:</div>
            <span className="badge badge-survey" style={{ fontSize: 14, padding: '6px 14px' }}>{survey.status.replace(/_/g,' ')}</span>
          </div>
          <div>
            {WORKFLOW_STEPS.map((step, i) => {
              const isDone = i <= currentStepIdx;
              return (
                <div key={step.key} style={{ display: 'flex', gap: 14, marginBottom: 16, opacity: isDone ? 1 : 0.4 }}>
                  <div style={{
                    width: 28, height: 28, borderRadius: '50%', flexShrink: 0, display: 'flex',
                    alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 600,
                    background: i === currentStepIdx ? 'var(--warning)' : isDone ? 'var(--accent2)' : 'var(--surface2)',
                    color: isDone || i === currentStepIdx ? 'white' : 'var(--text3)',
                  }}>
                    {i < currentStepIdx ? '✓' : i + 1}
                  </div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 500, color: i === currentStepIdx ? 'var(--warning)' : isDone ? 'var(--text)' : 'var(--text3)' }}>
                      {step.label} {i === currentStepIdx ? '← Posisi Saat Ini' : ''}
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--text3)' }}>
                      {step.key === 'draft' && 'Data survey dibuat, belum diproses'}
                      {step.key === 'disposisi' && 'Penugasan surveyor'}
                      {step.key === 'persiapan' && 'Persiapan peralatan dan tim survey'}
                      {step.key === 'survey_lapangan' && 'Pengumpulan data di lapangan'}
                      {step.key === 'analisis_data' && 'Analisis data hasil survey'}
                      {step.key === 'penilaian' && 'Pengisian form penilaian kerusakan'}
                      {step.key === 'diperiksa' && 'Review oleh Verifikator/Kabid'}
                      {step.key === 'disetujui' && 'Penetapan rekapitulasi tingkat kerusakan'}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {activeTab === 'ttd' && (
        <TTDPanel survey={survey} onUpdate={(data) => setSurvey(prev => ({...prev, ...data}))} />
      )}

      {activeTab === 'foto' && (
        <FotoGalleryPanel survey={survey} />
      )}

      {activeTab === 'laporan' && (
        <LaporanPage 
          survey={survey} 
          komponenList={komponen} 
          photos={JSON.parse(localStorage.getItem(`siprusak_photos_${survey.id}`) || '[]')}
        />
      )}

      {activeTab === 'ai' && (
        <AIInsightsPanel survey={survey} komponenList={komponen} />
      )}

      {/* AI Insights Panel - legacy placement, also shown in penilaian tab */}
      {activeTab === 'penilaian' && !loading && (
        <AIInsightsPanel survey={survey} komponenList={komponen} />
      )}
    </div>
  );
}

// ============================================================
// PANEL FOTO GALLERY — Kelola Foto Lapangan
// ============================================================
function FotoGalleryPanel({ survey }) {
  const [photos, setPhotos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [selectedKomponen, setSelectedKomponen] = useState('');
  const [showCamera, setShowCamera] = useState(false);
  const { addToast } = useApp();

  // Load existing photos from localStorage or Supabase
  useEffect(() => {
    loadPhotos();
  }, [survey.id]);

  const loadPhotos = async () => {
    setLoading(true);
    // Try localStorage first
    const saved = localStorage.getItem(`siprusak_photos_${survey.id}`);
    if (saved) {
      setPhotos(JSON.parse(saved));
    }
    
    // If Supabase is configured, try to load from there
    if (!IS_DEMO_MODE && supabase) {
      try {
        const { data, error } = await supabase
          .from('survey_photos')
          .select('*')
          .eq('survey_id', survey.id)
          .order('created_at', { ascending: false });
        
        if (!error && data) {
          setPhotos(data);
          localStorage.setItem(`siprusak_photos_${survey.id}`, JSON.stringify(data));
        }
      } catch (err) {
        console.log('Using localStorage for photos');
      }
    }
    setLoading(false);
  };

  const handlePhotoCapture = (imageData) => {
    const newPhoto = {
      id: Date.now().toString(),
      survey_id: survey.id,
      dataUrl: imageData,
      komponen_nama: selectedKomponen || 'Umum',
      timestamp: new Date().toISOString(),
      created_at: new Date().toISOString(),
      synced: false
    };
    
    const updated = [newPhoto, ...photos];
    setPhotos(updated);
    localStorage.setItem(`siprusak_photos_${survey.id}`, JSON.stringify(updated));
    setShowCamera(false);
    addToast('Foto berhasil disimpan', 'success');
    
    // Try to sync to Supabase
    if (!IS_DEMO_MODE && supabase) {
      syncPhotoToSupabase(newPhoto);
    }
  };

  const syncPhotoToSupabase = async (photo) => {
    try {
      // Upload image to storage
      const fileName = `${survey.id}/${photo.id}.jpg`;
      const blob = await (await fetch(photo.dataUrl)).blob();
      
      const { error: uploadError } = await supabase.storage
        .from('survey-photos')
        .upload(fileName, blob, { contentType: 'image/jpeg' });
      
      if (uploadError) throw uploadError;
      
      // Get public URL
      const { data: { publicUrl } } = supabase.storage
        .from('survey-photos')
        .getPublicUrl(fileName);
      
      // Save metadata to database
      const { error: dbError } = await supabase.from('survey_photos').insert({
        survey_id: survey.id,
        storage_path: fileName,
        public_url: publicUrl,
        komponen_nama: photo.komponen_nama,
        timestamp: photo.timestamp,
        synced: true
      });
      
      if (!dbError) {
        addToast('Foto tersinkron ke cloud', 'success');
      }
    } catch (err) {
      console.warn('Sync failed:', err.message);
    }
  };

  const handleDeletePhoto = async (photoId) => {
    if (!confirm('Yakin ingin menghapus foto ini?')) return;
    
    const updated = photos.filter(p => p.id !== photoId);
    setPhotos(updated);
    localStorage.setItem(`siprusak_photos_${survey.id}`, JSON.stringify(updated));
    
    // Delete from Supabase if exists
    if (!IS_DEMO_MODE && supabase) {
      try {
        await supabase.from('survey_photos').delete().eq('id', photoId);
        await supabase.storage.from('survey-photos').remove([`${survey.id}/${photoId}.jpg`]);
      } catch (err) {
        console.warn('Delete from cloud failed:', err.message);
      }
    }
    
    addToast('Foto dihapus', 'info');
  };

  const handleDownloadPhoto = (photo) => {
    const link = document.createElement('a');
    link.href = photo.dataUrl;
    link.download = `SIPRUSAK_${survey.nama_bangunan}_${photo.komponen_nama}_${photo.id}.jpg`;
    link.click();
  };

  const komponenOptions = [
    'Umum',
    'Pondasi & Sloof',
    'Kolom',
    'Balok',
    'Plat Lantai',
    'Tangga',
    'Atap',
    'Dinding',
    'Pintu',
    'Jendela',
    'Lainnya'
  ];

  if (showCamera) {
    return (
      <div className="card">
        <div className="card-header">
          <span>📷 Ambil Foto — {selectedKomponen || 'Umum'}</span>
          <button className="btn btn-secondary btn-sm" onClick={() => setShowCamera(false)}>
            ✕ Tutup
          </button>
        </div>
        <FotoLapangan 
          onCapture={handlePhotoCapture}
          komponenNama={selectedKomponen || 'Umum'}
        />
      </div>
    );
  }

  return (
    <div>
      {/* Photo Upload Section */}
      <div className="card" style={{ marginBottom: 20 }}>
        <div className="card-header">
          <span>📷 Tambah Foto Lapangan</span>
        </div>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'flex-end' }}>
          <div style={{ flex: 1, minWidth: 200 }}>
            <label>Komponen Bangunan</label>
            <select 
              value={selectedKomponen} 
              onChange={(e) => setSelectedKomponen(e.target.value)}
              style={{ width: '100%' }}
            >
              <option value="">Pilih Komponen...</option>
              {komponenOptions.map(opt => (
                <option key={opt} value={opt}>{opt}</option>
              ))}
            </select>
          </div>
          <button 
            className="btn btn-primary"
            onClick={() => setShowCamera(true)}
          >
            📷 Buka Kamera
          </button>
        </div>
      </div>

      {/* Photo Gallery */}
      <div className="card">
        <div className="card-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span>🖼️ Gallery Foto ({photos.length})</span>
          {photos.length > 0 && (
            <button 
              className="btn btn-secondary btn-sm"
              onClick={() => {
                if (confirm('Yakin ingin menghapus semua foto?')) {
                  setPhotos([]);
                  localStorage.removeItem(`siprusak_photos_${survey.id}`);
                }
              }}
            >
              🗑️ Hapus Semua
            </button>
          )}
        </div>
        
        {loading ? (
          <div className="loading"><div className="spinner"/></div>
        ) : photos.length === 0 ? (
          <div className="empty-state" style={{ padding: 40 }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>📷</div>
            <p>Belum ada foto lapangan</p>
            <p style={{ fontSize: 12, color: 'var(--text3)', marginTop: 8 }}>
              Tambahkan foto untuk dokumentasi kondisi bangunan
            </p>
          </div>
        ) : (
          <div style={{ 
            display: 'grid', 
            gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', 
            gap: 16 
          }}>
            {photos.map(photo => (
              <div 
                key={photo.id} 
                style={{
                  background: 'var(--bg-elevated)',
                  border: '1px solid var(--border-default)',
                  borderRadius: 8,
                  overflow: 'hidden',
                  transition: 'all 0.2s ease',
                  position: 'relative'
                }}
                className="photo-card"
              >
                <img 
                  src={photo.dataUrl || photo.public_url} 
                  alt={photo.komponen_nama}
                  style={{ width: '100%', height: 150, objectFit: 'cover', cursor: 'pointer' }}
                  onClick={() => window.open(photo.dataUrl || photo.public_url, '_blank')}
                />
                <div style={{ padding: 12 }}>
                  <div style={{ 
                    fontSize: 11, 
                    fontWeight: 600, 
                    color: 'var(--accent-secondary)',
                    fontFamily: 'var(--mono)',
                    marginBottom: 4
                  }}>
                    {photo.komponen_nama}
                  </div>
                  <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>
                    {new Date(photo.timestamp).toLocaleString('id-ID')}
                  </div>
                  {photo.synced && (
                    <div style={{ 
                      fontSize: 9, 
                      color: 'var(--status-ringan)', 
                      marginTop: 4,
                      display: 'flex',
                      alignItems: 'center',
                      gap: 4
                    }}>
                      <span>✓</span> Tersinkron
                    </div>
                  )}
                </div>
                <div style={{ 
                  display: 'flex', 
                  gap: 8, 
                  padding: '0 12px 12px'
                }}>
                  <button 
                    className="btn btn-secondary btn-sm"
                    style={{ flex: 1, fontSize: 10 }}
                    onClick={() => handleDownloadPhoto(photo)}
                  >
                    ⬇ Download
                  </button>
                  <button 
                    className="btn btn-danger btn-sm"
                    style={{ fontSize: 10 }}
                    onClick={() => handleDeletePhoto(photo.id)}
                  >
                    🗑️
                  </button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Tips Card */}
      <div className="card" style={{ marginTop: 20 }}>
        <div className="card-header">💡 Tips Foto Lapangan</div>
        <ul style={{ fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.8, paddingLeft: 20 }}>
          <li>Ambil foto dari sudut yang menunjukkan kerusakan dengan jelas</li>
          <li>Pastikan pencahayaan cukup (gunakan flash jika diperlukan)</li>
          <li>Sertakan objek referensi untuk skala (misal: tangan, penggaris)</li>
          <li>Foto dokumentasi minimal: depan, samping, detail kerusakan</li>
          <li>Setiap foto akan otomatis diberi timestamp dan watermark</li>
        </ul>
      </div>
    </div>
  );
}

function TTDPanel({ survey, onUpdate }) {
  const canvasRef = useRef(null);
  const [isDrawing, setIsDrawing] = useState(false);
  const [activeTTD, setActiveTTD] = useState('surveyor');
  const [ttdData, setTtdData] = useState({
    nama_ttd_surveyor: survey.nama_ttd_surveyor || '',
    nama_ttd_menyetujui: survey.nama_ttd_menyetujui || '',
    nama_ttd_mengetahui: survey.nama_ttd_mengetahui || '',
    ttd_surveyor: survey.ttd_surveyor || '',
    ttd_menyetujui: survey.ttd_menyetujui || '',
    ttd_mengetahui: survey.ttd_mengetahui || '',
  });
  const { addToast } = useApp();

  const startDraw = (e) => {
    e.preventDefault();
    setIsDrawing(true);
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    ctx.beginPath();
    ctx.moveTo(clientX - rect.left, clientY - rect.top);
  };

  const draw = (e) => {
    e.preventDefault();
    if (!isDrawing) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineTo(clientX - rect.left, clientY - rect.top);
    ctx.stroke();
  };

  const stopDraw = (e) => {
    if (e) e.preventDefault();
    setIsDrawing(false);
    const canvas = canvasRef.current;
    const dataUrl = canvas.toDataURL('image/png');
    setTtdData(prev => ({ ...prev, [`ttd_${activeTTD}`]: dataUrl }));
  };

  const clearCanvas = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setTtdData(prev => ({ ...prev, [`ttd_${activeTTD}`]: '' }));
  };

  const loadTTD = (key) => {
    setActiveTTD(key);
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const existing = ttdData[`ttd_${key}`];
    if (existing) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0);
      img.src = existing;
    }
  };

  const handleSave = async () => {
    if (IS_DEMO_MODE) {
      onUpdate(ttdData);
      addToast('Data tanda tangan disimpan (mode demo)', 'info');
      return;
    }
    try {
      const { error } = await supabase.from('surveys').update(ttdData).eq('id', survey.id);
      if (error) throw error;
      onUpdate(ttdData);
      addToast('Tanda tangan disimpan', 'success');
    } catch (err) {
      addToast('Gagal menyimpan: ' + err.message, 'error');
    }
  };

  const ttdKeys = [
    { key: 'surveyor', label: 'Petugas Survey', namaKey: 'nama_ttd_surveyor' },
    { key: 'menyetujui', label: 'Menyetujui (Dinas PU)', namaKey: 'nama_ttd_menyetujui' },
    { key: 'mengetahui', label: 'Mengetahui (Dinas Pendidikan)', namaKey: 'nama_ttd_mengetahui' },
  ];

  return (
    <div className="card">
      <div className="card-header">Tanda Tangan Elektronik</div>
      
      <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
        {ttdKeys.map(t => (
          <button key={t.key}
            className={`btn ${activeTTD === t.key ? 'btn-primary' : 'btn-secondary'}`}
            onClick={() => loadTTD(t.key)}>
            {ttdData[`ttd_${t.key}`] ? '✓ ' : ''}{t.label}
          </button>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
        <div>
          <div style={{ marginBottom: 10 }}>
            <label>Nama {ttdKeys.find(t => t.key === activeTTD)?.label}</label>
            <input
              value={ttdData[ttdKeys.find(t => t.key === activeTTD)?.namaKey] || ''}
              onChange={e => setTtdData(prev => ({ ...prev, [ttdKeys.find(t => t.key === activeTTD)?.namaKey]: e.target.value }))}
              placeholder="Nama lengkap dan NIP" style={{ marginTop: 6 }}
            />
          </div>
          <div style={{ marginBottom: 8, fontSize: 11, color: 'var(--text3)' }}>Tanda tangan (gambar dengan mouse/stylus/jari):</div>
          <canvas
            ref={canvasRef}
            width={360} height={140}
            style={{ background: 'var(--surface2)', border: '1px solid var(--border2)', borderRadius: 6, cursor: 'crosshair', display: 'block', touchAction: 'none' }}
            onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
            onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}
          />
          <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
            <button className="btn btn-secondary btn-sm" onClick={clearCanvas}>Hapus</button>
            <span style={{ fontSize: 11, color: 'var(--text3)', alignSelf: 'center' }}>
              {new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' })}
            </span>
          </div>
        </div>

        <div>
          <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 10 }}>Preview Semua TTE:</div>
          {ttdKeys.map(t => (
            <div key={t.key} style={{ marginBottom: 16, padding: 12, background: 'var(--surface2)', borderRadius: 6 }}>
              <div style={{ fontSize: 10, color: 'var(--text3)', marginBottom: 6 }}>{t.label}</div>
              {ttdData[`ttd_${t.key}`] ? (
                <img src={ttdData[`ttd_${t.key}`]} style={{ height: 50, display: 'block' }} alt="ttd" />
              ) : (
                <div style={{ height: 40, borderBottom: '1px solid var(--border2)', display: 'flex', alignItems: 'flex-end', paddingBottom: 4, color: 'var(--text3)', fontSize: 11 }}>
                  (.....................................)
                </div>
              )}
              <div style={{ fontSize: 11, marginTop: 4, color: 'var(--text2)' }}>{ttdData[ttdKeys.find(tt => tt.key === t.key)?.namaKey] || '—'}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ marginTop: 20 }}>
        <button className="btn btn-primary" onClick={handleSave}>Simpan Tanda Tangan</button>
      </div>
    </div>
  );
}

// AI INSIGHTS PANEL
// ============================================================
function AIInsightsPanel({ survey, komponenList }) {
  const { isAnalyzing, aiInsights, analyzeDamagePattern, predictDamageProgression, generateAIReport } = useAIEngine();
  const [predictions, setPredictions] = useState(null);
  const [aiReport, setAiReport] = useState(null);
  const [activeTab, setActiveTab] = useState('analysis');
  const [hasAnalyzed, setHasAnalyzed] = useState(false);
  const { addToast } = useApp();

  const handleAnalyze = async () => {
    try {
      await analyzeDamagePattern(komponenList, survey);
      const pred = await predictDamageProgression(komponenList);
      setPredictions(pred);
      const report = await generateAIReport(survey, komponenList);
      setAiReport(report);
      setHasAnalyzed(true);
      addToast('Analisis AI selesai', 'success');
    } catch (err) {
      addToast('Analisis gagal: ' + err.message, 'error');
    }
  };

  useEffect(() => {
    if (komponenList.length > 0 && !hasAnalyzed) {
      handleAnalyze();
    }
  }, [komponenList.length]);

  const formatCurrency = (amount) => {
    return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(amount);
  };

  // Calculate additional technical metrics
  const calculateTechnicalMetrics = () => {
    if (!komponenList || komponenList.length === 0) return null;
    
    const struktur = komponenList.filter(k => k.sistem === 'STRUKTUR');
    const arsitektur = komponenList.filter(k => k.sistem === 'ARSITEKTUR');
    
    const strukturAvg = struktur.reduce((acc, k) => acc + (k.nilai_klasifikasi || 0), 0) / (struktur.length || 1);
    const arsitekturAvg = arsitektur.reduce((acc, k) => acc + (k.nilai_klasifikasi || 0), 0) / (arsitektur.length || 1);
    
    return { strukturAvg, arsitekturAvg, strukturCount: struktur.length, arsitekturCount: arsitektur.length };
  };

  const metrics = calculateTechnicalMetrics();

  return (
    <div className="card" style={{ marginTop: 20 }}>
      <div className="card-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span>🤖 Analisis AI - Standar KemenPU</span>
        {isAnalyzing && <span className="spinner" style={{ width: 16, height: 16 }} />}
      </div>

      {/* Tabs - Always clickable */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 16, borderBottom: '1px solid var(--border)' }}>
        {[
          { key: 'analysis', label: 'Analisis' },
          { key: 'prediction', label: 'Prediksi' },
          { key: 'cost', label: 'Biaya' },
          { key: 'report', label: 'Laporan' }
        ].map(tab => (
          <button key={tab.key}
            onClick={() => setActiveTab(tab.key)}
            style={{
              padding: '8px 16px', background: 'none', border: 'none', cursor: 'pointer',
              fontSize: 12, fontWeight: 500,
              color: activeTab === tab.key ? 'var(--accent2)' : 'var(--text3)',
              borderBottom: `2px solid ${activeTab === tab.key ? 'var(--accent2)' : 'transparent'}`,
              marginBottom: -1
            }}>
            {tab.label}
          </button>
        ))}
      </div>

      {!hasAnalyzed ? (
        <div className="empty-state" style={{ padding: 30 }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>🤖</div>
          <p>Klik "Analisis AI" untuk mendapatkan insight otomatis</p>
          <button className="btn btn-primary btn-sm" onClick={handleAnalyze} disabled={isAnalyzing}>
            {isAnalyzing ? 'Menganalisis...' : 'Analisis AI'}
          </button>
        </div>
      ) : (
        <div style={{ padding: 16 }}>
          {/* TAB: ANALISIS KOMPREHENSIF */}
          {activeTab === 'analysis' && aiInsights && (
            <div>
              {/* Status Keselamatan */}
              <div style={{ 
                padding: 16, 
                background: aiInsights.safetyRisk === 'CRITICAL' ? 'rgba(239,68,68,0.1)' : 'rgba(16,185,129,0.1)', 
                border: `1px solid ${aiInsights.safetyRisk === 'CRITICAL' ? 'var(--danger)' : 'var(--success)'}`,
                borderRadius: 8, 
                marginBottom: 20 
              }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: aiInsights.safetyRisk === 'CRITICAL' ? 'var(--danger)' : 'var(--success)', marginBottom: 6 }}>
                  {aiInsights.safetyRisk === 'CRITICAL' ? '⚠️ RISIKO KESELAMATAN KRITIS' : '✅ STATUS KESELAMATAN NORMAL'}
                </div>
                <div style={{ fontSize: 13, color: 'var(--text2)', lineHeight: 1.6 }}>{aiInsights.overallAssessment}</div>
                <div style={{ marginTop: 10, paddingTop: 10, borderTop: '1px solid rgba(255,255,255,0.1)' }}>
                  <span style={{ fontSize: 11, color: 'var(--text3)' }}>Prioritas: </span>
                  <span style={{ fontSize: 11, fontWeight: 600, color: aiInsights.priority === 'HIGH' ? 'var(--danger)' : 'var(--warning)' }}>
                    {aiInsights.priority === 'HIGH' ? 'TINGGI (Segera Ditindaklanjuti)' : 'SEDANG (Perencanaan Pemeliharaan)'}

                </div>
              </div>

              {/* Metrik Teknis */}
              {metrics && (
                <div style={{ marginBottom: 20 }}>
                  <h4 style={{ fontSize: 13, marginBottom: 12, color: 'var(--text)' }}>📊 Metrik Teknis per Sistem:</h4>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12 }}>
                    <div style={{ padding: 12, background: 'var(--surface2)', borderRadius: 6 }}>
                      <div style={{ fontSize: 11, color: 'var(--text3)' }}>STRUKTUR (Kritis)</div>
                      <div style={{ fontSize: 16, fontWeight: 700, color: metrics.strukturAvg > 45 ? 'var(--danger)' : metrics.strukturAvg > 30 ? 'var(--warning)' : 'var(--success)' }}>
                        {metrics.strukturAvg.toFixed(1)}%
                      </div>
                      <div style={{ fontSize: 10, color: 'var(--text3)' }}>{metrics.strukturCount} komponen</div>
                    </div>
                    <div style={{ padding: 12, background: 'var(--surface2)', borderRadius: 6 }}>
                      <div style={{ fontSize: 11, color: 'var(--text3)' }}>ARSITEKTUR</div>
                      <div style={{ fontSize: 16, fontWeight: 700, color: metrics.arsitekturAvg > 45 ? 'var(--danger)' : metrics.arsitekturAvg > 30 ? 'var(--warning)' : 'var(--success)' }}>
                        {metrics.arsitekturAvg.toFixed(1)}%

                      <div style={{ fontSize: 10, color: 'var(--text3)' }}>{metrics.arsitekturCount} komponen</div>
                    </div>

              {/* Pola Kerusakan */}
              <div style={{ marginBottom: 20 }}>

// ============================================================
// GEMINI API INTEGRATION
// ============================================================
async function callGemini(userMessage, surveyContext = '', imageBase64 = null, imageType = 'image/jpeg') {
  if (GEMINI_API_KEY === 'YOUR_GEMINI_API_KEY') {
    throw new Error('Gemini API key belum diatur');
  }
  
  const GEMINI_ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
  
  const parts = [];
  if (surveyContext) parts.push({ text: surveyContext });
  if (imageBase64) {
    parts.push({ inlineData: { mimeType: imageType, data: imageBase64 } });
    parts.push({ text: `Analisis foto kerusakan bangunan ini berdasarkan standar KemenPU. ${userMessage}` });
  } else {
    parts.push({ text: userMessage });
  }
  
  const payload = {
    system_instruction: { parts: [{ text: SIPRUSAK_SYSTEM_PROMPT }] },
    contents: [{ role: 'user', parts: parts }],
    generationConfig: {
      temperature: 0.3,
      topK: 40,
      topP: 0.95,
      maxOutputTokens: 2048,
    },
    safetySettings: [
      { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_NONE' },
      { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_NONE' },
      { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' }
    ]
  };

  if (window._geminiHistory && window._geminiHistory.length > 0) {
    payload.contents = [...window._geminiHistory, payload.contents[0]];
  }

  const response = await fetch(GEMINI_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || `Gemini API error: ${response.status}`);
  }

  const data = await response.json();
  const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Tidak ada respons';
  
  // Simpan history
  if (!window._geminiHistory) window._geminiHistory = [];
  window._geminiHistory.push({ role: 'user', parts: parts });
  window._geminiHistory.push({ role: 'model', parts: [{ text: aiText }] });
  if (window._geminiHistory.length > 20) window._geminiHistory = window._geminiHistory.slice(-20);
  
  return aiText;
}

// ============================================================
// OPENAI CHATGPT INTEGRATION
// ============================================================
async function callChatGPT(userMessage, surveyContext = '', imageBase64 = null, onStream = null) {
  if (OPENAI_API_KEY === 'YOUR_OPENAI_API_KEY') {
    throw new Error('OpenAI API key belum diatur');
  }
  
  const OPENAI_ENDPOINT = 'https://api.openai.com/v1/chat/completions';
  const messages = [{ role: 'system', content: SIPRUSAK_SYSTEM_PROMPT }];
  
  if (window._chatHistory && window._chatHistory.length > 0) {
    messages.push(...window._chatHistory.slice(-10));
  }

  let userContent;
  if (imageBase64) {
    userContent = [
      { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${imageBase64}`, detail: 'high' } },
      { type: 'text', text: surveyContext ? `${surveyContext}\n\n${userMessage}` : `Analisis foto kerusakan bangunan ini. ${userMessage}` }
    ];
  } else {
    userContent = surveyContext ? `${surveyContext}\n\n${userMessage}` : userMessage;
  }
  messages.push({ role: 'user', content: userContent });

  const payload = {
    model: OPENAI_MODEL,
    messages: messages,
    temperature: 0.3,
    max_tokens: 2000,
    stream: !!onStream
  };

  const response = await fetch(OPENAI_ENDPOINT, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${OPENAI_API_KEY}`
    },
    body: JSON.stringify(payload)
  });

  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || `OpenAI error: ${response.status}`);
  }

  if (onStream) {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
      for (const line of lines) {
        const json = line.replace('data: ', '');
        if (json === '[DONE]') break;
        try {
          const data = JSON.parse(json);
          const delta = data.choices?.[0]?.delta?.content || '';
          fullText += delta;
          onStream(delta, fullText);
        } catch(e) {}
      }
    }

    if (!window._chatHistory) window._chatHistory = [];
    window._chatHistory.push({ role: 'user', content: userContent });
    window._chatHistory.push({ role: 'assistant', content: fullText });
    return fullText;
  } else {
    const data = await response.json();
    const aiText = data.choices?.[0]?.message?.content || 'Tidak ada respons';
    
    if (!window._chatHistory) window._chatHistory = [];
    window._chatHistory.push({ role: 'user', content: userContent });
    window._chatHistory.push({ role: 'assistant', content: aiText });
    
    return aiText;
  }
}

// AI PROVIDER MANAGER — Auto-fallback
// ============================================================
class AIProviderManager {
  constructor() {
    this.primaryProvider = 'gemini';
    this.fallbackEnabled = true;
  }

  async ask(message, context = '', imageBase64 = null, onStream = null) {
    try {
      if (this.primaryProvider === 'gemini') {
        return await callGemini(message, context, imageBase64);
      } else {
        return await callChatGPT(message, context, imageBase64, onStream);
      }
    } catch (error) {
      console.warn(`${this.primaryProvider} gagal:`, error.message);
      if (this.fallbackEnabled) {
        console.log('Fallback ke provider alternatif...');
        try {
          if (this.primaryProvider === 'gemini') {
            return await callChatGPT(message, context, imageBase64, onStream);
          } else {
            return await callGemini(message, context, imageBase64);
          }
        } catch (fallbackError) {
          throw new Error('Semua AI provider gagal. Periksa koneksi dan API key.');
        }
      }
      throw error;
    }
  }
  
  switchProvider(provider) {
    this.primaryProvider = provider;
    window._geminiHistory = [];
    window._chatHistory = [];
  }
}

// FOTO LAPANGAN — Kamera + Timestamp Configurable
// ============================================================
function FotoLapangan({ onCapture, komponenNama }) {
  const [isOpen, setIsOpen] = useState(false);
  const [capturedImage, setCapturedImage] = useState(null);
  const [timestampConfig, setTimestampConfig] = useState({
    showDate: true,
    showTime: true,
    showLocation: true,
    position: 'bottom-right', // 'bottom-right', 'bottom-left', 'top-right', 'top-left'
    format: 'DD/MM/YYYY HH:mm'
  });
  const [customText, setCustomText] = useState('');
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const fileInputRef = useRef(null);

  const startCamera = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { 
          facingMode: 'environment',
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        } 
      });
      videoRef.current.srcObject = stream;
    } catch (err) {
      console.log('Camera not available, using file upload');
    }
  };

  const stopCamera = () => {
    const stream = videoRef.current?.srcObject;
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
  };

  const capturePhoto = () => {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    
    // Draw video frame
    ctx.drawImage(video, 0, 0);
    
    // Add timestamp watermark
    addTimestampWatermark(ctx, canvas.width, canvas.height);
    
    // Get image data
    const imageData = canvas.toDataURL('image/jpeg', 0.9);
    setCapturedImage(imageData);
    stopCamera();
  };

  const addTimestampWatermark = (ctx, width, height) => {
    const now = new Date();
    const dateStr = now.toLocaleDateString('id-ID');
    const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    const timestamp = `${dateStr} ${timeStr}`;
    
    // Calculate position
    let x, y;
    const padding = 20;
    const lineHeight = 30;
    const text = timestampConfig.showDate && timestampConfig.showTime ? timestamp : 
                 timestampConfig.showDate ? dateStr : timeStr;
    
    // Position calculation
    if (timestampConfig.position.includes('right')) {
      x = width - padding;
    } else {
      x = padding;
    }
    if (timestampConfig.position.includes('bottom')) {
      y = height - padding - 10;
    } else {
      y = padding + 20;
    }
    
    // Draw semi-transparent background
    ctx.save();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    const textWidth = ctx.measureText(text).width + 20;
    const bgX = timestampConfig.position.includes('right') ? x - textWidth : x;
    ctx.fillRect(bgX, y - 25, textWidth, 35);
    
    // Draw text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = timestampConfig.position.includes('right') ? 'right' : 'left';
    ctx.fillText(text, x, y);
    
    // Draw custom text if provided
    if (customText) {
      const customY = y - lineHeight;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      const customWidth = ctx.measureText(customText).width + 20;
      const customBgX = timestampConfig.position.includes('right') ? x - customWidth : x;
      ctx.fillRect(customBgX, customY - 25, customWidth, 35);
      ctx.fillStyle = '#fff';
      ctx.fillText(customText, x, customY);
    }
    
    ctx.restore();
  };

  const handleFileUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const canvas = canvasRef.current;
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        addTimestampWatermark(ctx, canvas.width, canvas.height);
        setCapturedImage(canvas.toDataURL('image/jpeg', 0.9));
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  };

  const savePhoto = () => {
    if (capturedImage && onCapture) {
      onCapture(capturedImage);
    }
    setIsOpen(false);
    setCapturedImage(null);
  };

  const retake = () => {
    setCapturedImage(null);
    startCamera();
  };

  if (!isOpen) {
    return (
      <button 
        className="btn btn-secondary btn-sm"
        onClick={() => { setIsOpen(true); startCamera(); }}
        title="Ambil foto lapangan"
      >
        📷 Foto
      </button>
    );
  }

  return (
    <div style={{
      position: 'fixed',
      top: 0, left: 0, right: 0, bottom: 0,
      background: 'rgba(0,0,0,0.9)',
      zIndex: 2000,
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: 'center',
      padding: 20
    }}>
      <div style={{
        background: 'var(--surface)',
        borderRadius: 12,
        padding: 20,
        maxWidth: 800,
        width: '100%',
        maxHeight: '90vh',
        overflow: 'auto'
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <h3 style={{ margin: 0, fontSize: 16 }}>📷 Foto Lapangan — {komponenNama}</h3>
          <button onClick={() => { setIsOpen(false); stopCamera(); }} style={{ fontSize: 20 }}>✕</button>
        </div>

        {/* Timestamp Configuration */}
        <div style={{ 
          background: 'var(--surface2)', 
          padding: 12, 
          borderRadius: 8, 
          marginBottom: 16,
          fontSize: 12
        }}>
          <div style={{ fontWeight: 600, marginBottom: 8 }}>⚙️ Konfigurasi Timestamp:</div>
          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            <label style={{ display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer' }}>
              <input 
                type="checkbox" 
                checked={timestampConfig.showDate} 
                onChange={(e) => setTimestampConfig({...timestampConfig, showDate: e.target.checked})}
              />
              Tanggal
            </label>
            <label style={{ display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer' }}>
              <input 
                type="checkbox" 
                checked={timestampConfig.showTime} 
                onChange={(e) => setTimestampConfig({...timestampConfig, showTime: e.target.checked})}
              />
              Jam
            </label>
            <select 
              value={timestampConfig.position}
              onChange={(e) => setTimestampConfig({...timestampConfig, position: e.target.value})}
              style={{ fontSize: 12, padding: '2px 8px' }}
            >
              <option value="bottom-right">Kanan Bawah</option>
              <option value="bottom-left">Kiri Bawah</option>
              <option value="top-right">Kanan Atas</option>
              <option value="top-left">Kiri Atas</option>
            </select>
          </div>
          <input
            type="text"
            placeholder="Teks tambahan (opsional)"
            value={customText}
            onChange={(e) => setCustomText(e.target.value)}
            style={{ 
              width: '100%', 
              marginTop: 8, 
              padding: '6px 10px', 
              fontSize: 12,
              background: 'var(--bg)',
              border: '1px solid var(--border)',
              borderRadius: 4,
              color: 'var(--text)'
            }}
          />
        </div>

        {/* Camera or Captured Image */}
        <div style={{ position: 'relative', background: '#000', borderRadius: 8, overflow: 'hidden' }}>
          {!capturedImage ? (
            <>
              <video 
                ref={videoRef} 
                autoPlay 
                playsInline
                style={{ width: '100%', maxHeight: 400, display: videoRef.current?.srcObject ? 'block' : 'none' }}
              />
              <canvas ref={canvasRef} style={{ display: 'none' }} />
              
              {!videoRef.current?.srcObject && (
                <div style={{ padding: 40, textAlign: 'center' }}>
                  <p>Kamera tidak tersedia. Upload foto dari galeri:</p>
                  <input 
                    type="file" 
                    accept="image/*" 
                    onChange={handleFileUpload}
                    ref={fileInputRef}
                    style={{ display: 'none' }}
                  />
                  <button 
                    className="btn btn-primary"
                    onClick={() => fileInputRef.current?.click()}
                    style={{ marginTop: 12 }}
                  >
                    📁 Pilih Foto
                  </button>
                </div>
              )}
              
              {videoRef.current?.srcObject && (
                <button 
                  onClick={capturePhoto}
                  style={{
                    position: 'absolute',
                    bottom: 20,
                    left: '50%',
                    transform: 'translateX(-50%)',
                    width: 60,
                    height: 60,
                    borderRadius: '50%',
                    background: '#fff',
                    border: '4px solid var(--accent2)',
                    cursor: 'pointer'
                  }}
                />
              )}
            </>
          ) : (
            <>
              <img src={capturedImage} alt="Captured" style={{ width: '100%', maxHeight: 400 }} />
              <canvas ref={canvasRef} style={{ display: 'none' }} />
            </>
          )}
        </div>

        {/* Action Buttons */}
        <div style={{ display: 'flex', gap: 10, marginTop: 16, justifyContent: 'flex-end' }}>
          {!capturedImage ? (
            <>
              <button 
                className="btn btn-secondary"
                onClick={() => fileInputRef.current?.click()}
              >
                📁 Dari Galeri
              </button>
              <input 
                type="file" 
                accept="image/*" 
                onChange={handleFileUpload}
                ref={fileInputRef}
                style={{ display: 'none' }}
              />
            </>
          ) : (
            <>
              <button className="btn btn-secondary" onClick={retake}>📷 Ulangi</button>
              <button className="btn btn-primary" onClick={savePhoto}>✅ Simpan</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// Helper functions for report generation
function getKlasifikasiLabel(persen) {
  if (persen === 0) return 'Tidak Rusak';
  if (persen <= 10) return 'Rusak Sangat Ringan';
  if (persen <= 30) return 'Rusak Ringan';
  if (persen <= 45) return 'Rusak Sedang';
  if (persen <= 60) return 'Rusak Berat';
  if (persen < 100) return 'Rusak Sangat Berat';
  return 'Tidak Sesuai';
}

function formatRupiah(amount) {
  return new Intl.NumberFormat('id-ID', {
    style: 'currency',
    currency: 'IDR',
    minimumFractionDigits: 0
  }).format(amount);
}

function generateRecommendations(komponenList, totalPersen) {
  const recommendations = [];
  
  // Add general recommendations based on total damage
  if (totalPersen <= 30) {
    recommendations.push('Pemeliharaan rutin dan perbaikan ringan');
  } else if (totalPersen <= 45) {
    recommendations.push('Rehabilitasi sebagian komponen rusak');
    recommendations.push('Prioritas perbaikan pada struktur');
  } else {
    recommendations.push('Rekonstruksi/evakuasi dipertimbangkan');
    recommendations.push('Evaluasi kelayakan struktur oleh ahli');
  }
  
  // Add specific recommendations for critical components
  komponenList.forEach(k => {
    const h = hitungKomponenKerusakan(k);
    if (k.tahap1 === 'ada_kerusakan_membahayakan') {
      recommendations.push(`SEGERA: Perbaikan ${k.nama} (membahayakan keselamatan)`);
    } else if (h.persen > 45) {
      recommendations.push(`PENTING: Rehabilitasi ${k.nama} (${h.persen.toFixed(1)}% rusak)`);
    } else if (h.persen > 30) {
      recommendations.push(`Sedang: Perbaikan ${k.nama} (${h.persen.toFixed(1)}% rusak)`);
    }
  });
  
  return recommendations;
}

function calculateCostEstimate(komponenList, perbup) {
  let total = 0;
  const items = [];
  
  komponenList.forEach(k => {
    const h = hitungKomponenKerusakan(k);
    if (h.persen > 0) {
      // Estimate repair volume (assume 60% of damaged volume needs repair)
      const volRusak = h.volRusak;
      const volRepair = volRusak * 0.6;
      
      // Determine unit price based on component type
      let unitPrice = perbup.satuan.pekerjaan_beton; // default
      
      if (k.nama.toLowerCase().includes('atap')) unitPrice = perbup.satuan.pekerjaan_atap;
      else if (k.nama.toLowerCase().includes('dinding')) unitPrice = perbup.satuan.pekerjaan_aci;
      else if (k.nama.toLowerCase().includes('lantai')) unitPrice = perbup.satuan.pekerjaan_pasang_keramik;
      else if (k.nama.toLowerCase().includes('plafond')) unitPrice = perbup.satuan.pekerjaan_plafond;
      else if (k.nama.toLowerCase().includes('pintu')) unitPrice = perbup.satuan.pekerjaan_pintu;
      else if (k.nama.toLowerCase().includes('jendela')) unitPrice = perbup.satuan.pekerjaan_jendela;
      else if (k.nama.toLowerCase().includes('kusen')) unitPrice = perbup.satuan.pekerjaan_kusen;
      
      const cost = volRepair * unitPrice;
      total += cost;
      
      items.push({
        komponen: k.nama,
        volumeRusak: volRusak.toFixed(2),
        volumeRepair: volRepair.toFixed(2),
        satuan: k.satuan,
        hargaSatuan: unitPrice,
        jumlah: cost
      });
    }
  });
  
  // Add overhead (10%)
  const overhead = total * 0.1;
  
  return {
    items,
    subtotal: total,
    overhead,
    total: total + overhead,
    totalFormatted: formatRupiah(total + overhead)
  };
}

function generateRAB(komponenList, perbup) {
  const struktur = [];
  const arsitektur = [];
  const utilitas = [];
  
  komponenList.forEach(k => {
    const h = hitungKomponenKerusakan(k);
    if (h.persen > 0) {
      const item = {
        nama: k.nama,
        volume: h.volRusak.toFixed(2),
        satuan: k.satuan
      };
      
      if (k.sistem === 'STRUKTUR') struktur.push(item);
      else if (k.sistem === 'ARSITEKTUR') arsitektur.push(item);
      else utilitas.push(item);
    }
  });
  
  return {
    pekerjaanStruktur: struktur,
    pekerjaanArsitektur: arsitektur,
    pekerjaanUtilitas: utilitas,
    grandTotal: calculateCostEstimate(komponenList, perbup).total
  };
}

function LaporanPage({ survey, komponenList, photos = [], aiInsights = null, predictions = null }) {
  const [reportData, setReportData] = useState(null);
  const [activeSection, setActiveSection] = useState('executive');
  const [generating, setGenerating] = useState(false);
  const [exporting, setExporting] = useState(false);
  const { addToast } = useApp();

  useEffect(() => {
    if (survey && komponenList) {
      generateReport();
    }
  }, [survey, komponenList, photos, aiInsights]);

  const generateReport = async () => {
    setGenerating(true);
    try {
      const data = generateReportData(survey, komponenList, aiInsights, predictions, photos);
      setReportData(data);
      addToast('Laporan berhasil dibuat', 'success');
    } catch (err) {
      addToast('Gagal membuat laporan: ' + err.message, 'error');
    } finally {
      setGenerating(false);
    }
  };

  const exportToPDF = async () => {
    setExporting(true);
    try {
      // Create a printable HTML version
      const printWindow = window.open('', '_blank');
      printWindow.document.write(generatePrintableHTML(reportData));
      printWindow.document.close();
      printWindow.focus();
      setTimeout(() => {
        printWindow.print();
        addToast('Laporan siap dicetak/simpan sebagai PDF', 'success');
        setExporting(false);
      }, 1000);
    } catch (err) {
      addToast('Gagal export: ' + err.message, 'error');
      setExporting(false);
    }
  };

  const exportToWord = () => {
    const html = generateWordHTML(reportData);
    const blob = new Blob(['\ufeff', html], {
      type: 'application/msword'
    });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `Laporan_Kerusakan_${survey?.nama_bangunan || 'Bangunan'}_${new Date().toISOString().split('T')[0]}.doc`;
    link.click();

        <div className="empty-state">

          <p>Tidak ada data untuk dibuat laporan</p>
        </div>
      </div>

  }

  return (
    <div>
      {/* Header Actions */}
      <div className="card" style={{ marginBottom: 20 }}>
        <div className="card-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span>📄 Laporan Penilaian Kerusakan</span>
          <div style={{ display: 'flex', gap: 10 }}>
            <button className="btn btn-secondary btn-sm" onClick={exportToWord} disabled={exporting}>
              📝 Export Word
            </button>
            <button className="btn btn-primary btn-sm" onClick={exportToPDF} disabled={exporting}>
              📄 Export PDF
            </button>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap' }}>
          <div>
            <div style={{ fontSize: 10, color: 'var(--text-muted)', marginBottom: 4 }}>STATUS</div>
            <span className={`badge badge-${reportData.executive.kategori.toLowerCase().replace(/\s/g, '-')}`}>

// AI CHAT WIDGET — Enhanced Version
